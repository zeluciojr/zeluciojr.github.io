<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="description"
    content="Notas sobre vida e software." />

  <title>Notas do Zé</title>
  <link rel="icon" href="./assets/nz-mark-trim.png" />

  <style>
    :root {
      --bg: #050505;
      --text: #f5f5f5;
      --muted: #a3a3a3;
      --muted-soft: #737373;
      --border: #262626;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.045), transparent 32%),
        linear-gradient(180deg, #050505 0%, #090909 45%, #050505 100%);
      color: var(--text);
      font-family:
        Inter,
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 0 24px 8vh;
    }

    .hero {
      text-align: center;
      transform: translateY(-4vh);
    }

    .eyebrow {
      margin: 0 0 14px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.7;
    }

    .eyebrow span {
      display: block;
    }

    .eyebrow .en {
      color: var(--muted-soft);
      font-size: 10px;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(56px, 9vw, 96px);
      line-height: 1;
      letter-spacing: -0.06em;
      font-weight: 500;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      margin-top: 62px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 20px;
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      transition:
        transform 0.2s ease,
        border-color 0.2s ease;
    }

    .button.primary {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    .button:hover {
      transform: translateY(-2px);
      border-color: var(--text);
    }

    /* Intro animation */

    @keyframes heroIntro {
      from {
        opacity: 0;
        transform: translateY(-2vh);
        filter: blur(6px);
      }

      to {
        opacity: 1;
        transform: translateY(-4vh);
        filter: blur(0);
      }
    }

    @keyframes elementIntro {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes titleFadeIntro {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .hero {
      opacity: 0;
      animation: heroIntro 4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .eyebrow,
    .actions {
      opacity: 0;
      animation: elementIntro 0.75s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    h1 {
      opacity: 0;
      animation: titleFadeIntro 4.0s ease forwards;
    }

    .eyebrow {
      animation-delay: 0.18s;
    }

    h1 {
      animation-delay: 0.3s;
    }

    .actions {
      animation-delay: 0.44s;
    }

    @media (prefers-reduced-motion: reduce) {

      .hero,
      .eyebrow,
      h1,
      .actions {
        opacity: 1;
        filter: none;
        animation: none;
      }

      .hero {
        transform: translateY(-4vh);
      }

      .eyebrow,
      h1,
      .actions {
        transform: none;
      }
    }

    @media (max-width: 520px) {
      main {
        padding-inline: 20px;
      }

      .eyebrow {
        margin-bottom: 16px;
        letter-spacing: 0.10em;
        font-size: 11px;
        line-height: 1.6;
      }

      h1 {
        font-size: clamp(46px, 16vw, 68px);
      }
    }
  </style>
</head>

<body>
  <main>
    <section class="hero" aria-labelledby="page-title">
      <p class="eyebrow" aria-label="Escolha o idioma para Notas do Zé. Choose language for Notas do Zé.">
        <span>Escolha o idioma para</span>
        <span class="en">Choose language for</span>
      </p>

      <h1 id="page-title">Notas do Zé</h1>

      <div class="actions" aria-label="Idiomas disponíveis">
        <a class="button primary" href="./pt/index.html">Português</a>
        <a class="button" href="./en/index.html">English</a>
      </div>
    </section>
  </main>
</body>

</html>
