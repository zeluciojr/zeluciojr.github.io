<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Pages Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
    }

    .card {
      background: #1e293b;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
      max-width: 600px;
    }

    h1 {
      color: #38bdf8;
      margin-bottom: 12px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
    }

    code {
      background: #334155;
      padding: 4px 8px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>GitHub Pages is working 🚀</h1>
    <p>
      If you can see this page, your repository is being served successfully.
    </p>
    <p>
      Custom domain test: <code>OK</code>
    </p>
  </main>
</body>
</html>
